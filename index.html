<!DOCTYPE html>
<html>
<body>

<h2>Calendariosssss232</h2>

<button onclick="loadData()">Cargar datos</button>

<div id="result"></div>

<script>

async function loadData() {

    try {

        let url = "https://telefonicacorp.sharepoint.com/sites/MOEVE.TMEZC/Shared%20Documents/General/Contactos%20y%20disponibilidad/calendario.json";

        let res = await fetch(url);
        let data = await res.json();

        let items = data.body.value;

        let html = "<h3>Datos:</h3>";

        items.forEach(item => {
            html += "Usuario: " + item.Title +
                    " | Día: " + item.Dia +
                    " | Estado: " + item.Estado + "<br>";
        });

        document.getElementById("result").innerHTML = html;

    } catch (err) {

        console.error("ERROR REAL:", err);

        alert("Error cargando datos (abre F12 → Console)");
    }
}
</script>

</body>
</html>
