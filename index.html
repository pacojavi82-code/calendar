<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calendario Guardias</title>

<style>
body { font-family: Arial; }
button { margin: 10px; padding:10px; }
</style>

</head>

<body>

<h2>Test conexión SharePoint</h2>

<button onclick="loadData()">Cargar datos</button>

<div id="result"></div>

<script>

// ========= CONFIG =========
const siteUrl = "https://telefonicacorp.sharepoint.com/sites/MOEVE.TMEZC";
const listName = "CalendarioGuardias";

// ========= LOAD =========
async function loadData() {

    let url = `${siteUrl}/_api/web/lists/getbytitle('${listName}')/items?$top=10`;

    try {

        let res = await fetch(url, {
            method: "GET",
            credentials: "include",  // 🔥 CLAVE
            headers: {
                "Accept": "application/json;odata=verbose"
            }
        });

        let data = await res.json();

        let html = "<h3>Datos:</h3>";

        data.d.results.forEach(item => {
            html += `
                <div>
                    Usuario: ${item.Title} |
                    Día: ${item.Dia} |
                    Estado: ${item.Estado}
                </div>
            `;
        });

        document.getElementById("result").innerHTML = html;

    } catch (err) {
        console.error(err);
        alert("Error cargando datos");
    }
}

</script>

</body>
</html>
