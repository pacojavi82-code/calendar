<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calendario</title>
</head>

<body>

<h2>Calendario</h2>

<button onclick="loadData()">Cargar datos</button>

<div id="result"></div>

<script>

async function loadData() {

    let url = "https://telefonicacorp.sharepoint.com/sites/MOEVE.TMEZC/_layouts/15/download.aspx?UniqueId=107bcc199efa49118ed42d1c6ce40488&e=CWJv2u";

    try {
        let res = await fetch(url);
        let data = await res.json();

        let items = data.body.value;

        let html = "<h3>Datos:</h3>";

        items.forEach(function(item) {
            html += "<div>Usuario: " + item.Title +
                    " | Día: " + item.Dia +
                    " | Estado: " + item.Estado + "</div>";
        });

        document.getElementById("result").innerHTML = html;

    } catch (err) {
        console.error(err);
        alert("Error cargando datos");
    }
}

</script>

</body>
</html>
